<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Expert Decision Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-choice { @apply flex-1 bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3 rounded-xl transition-all border-2 border-transparent focus:border-yellow-400; }
        .btn-main { @apply w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all mb-3; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">

    <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden mt-4">
        <div class="bg-yellow-400 p-6">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="font-black text-2xl uppercase italic leading-none">Glovo Support</h1>
                    <p class="text-[10px] font-bold opacity-70 tracking-tighter mt-1">DECISION TREE V3.0</p>
                </div>
                <button onclick="resetFlow()" class="bg-black text-white text-[10px] px-3 py-1 rounded-full font-bold">REINICIAR</button>
            </div>
            
            <div class="mt-4 bg-white/30 p-3 rounded-lg flex items-center justify-between">
                <span class="text-xs font-bold italic">O cliente pediu cancelamento?</span>
                <input type="checkbox" id="globalCancel" onchange="toggleCancelMode()" class="w-5 h-5 accent-red-600">
            </div>
        </div>

        <div id="content" class="p-8 min-h-[400px]">
            </div>
    </div>

    <script>
        let state = {
            atrasoMinutos: 0,
            cancelMode: false
        };

        function render(html) {
            document.getElementById('content').innerHTML = `<div class="fade-in">${html}</div>`;
        }

        function resetFlow() {
            state.atrasoMinutos = 0;
            state.cancelMode = false;
            document.getElementById('globalCancel').checked = false;
            step1();
        }

        // --- MODO CANCELAMENTO ---
        function toggleCancelMode() {
            state.cancelMode = document.getElementById('globalCancel').checked;
            if (state.cancelMode) {
                if (state.atrasoMinutos < 40) {
                    render(`
                        <div class="bg-red-50 p-6 rounded-2xl border-2 border-red-200 text-center">
                            <h3 class="text-red-600 font-black text-xl mb-2">CANCELAMENTO NEGADO</h3>
                            <p class="text-sm text-red-800 mb-4">O atraso atual é de <b>${state.atrasoMinutos} min</b>. Para cancelamento gratuito, o atraso deve ser ≥ 40 min.</p>
                            <p class="text-xs font-bold uppercase italic text-gray-500">Desative a checkbox para continuar o suporte.</p>
                        </div>
                    `);
                } else {
                    stepCancelChecklist();
                }
            } else {
                step2(); // Retorna ao fluxo de identificação se desmarcado
            }
        }

        // --- PASSO 1: CALCULO ---
        function step1() {
            render(`
                <h2 class="text-lg font-black mb-4 uppercase">1. Calcular Atraso</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">ETA PREVISTO</label>
                        <input type="time" id="eta" class="w-full p-3 bg-gray-50 border rounded-xl">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">HORA ACTUAL</label>
                        <input type="time" id="now" class="w-full p-3 bg-gray-50 border rounded-xl">
                    </div>
                    <button onclick="handleCalc()" class="btn-main !bg-yellow-400 !text-black">AVANÇAR</button>
                </div>
            `);
        }

            const v1 = document.getElementById('eta').value;
            const v2 = document.getElementById('now').value;
            if(!v1 || !v2) return;
            const [h1, m1] = v1.split(':').map(Number);
            const [h2, m2] = v2.split(':').map(Number);
