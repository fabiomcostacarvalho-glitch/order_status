<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Support Expert v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-nav { @apply w-full bg-slate-900 text-white font-bold py-3 px-4 rounded-xl hover:bg-slate-800 transition-all flex justify-between items-center mb-2 text-sm; }
        .btn-check { @apply flex items-center gap-3 p-3 bg-slate-50 rounded-xl border-2 border-transparent cursor-pointer hover:bg-slate-100 transition-all text-xs font-bold uppercase; }
        input[type="checkbox"]:checked + span { @apply text-blue-600; }
    </style>
</head>
<body class="bg-yellow-400 min-h-screen p-4 font-sans text-slate-900">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6 mt-4">
        
        <div class="flex-1 bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col min-h-[600px]">
            
            <div class="bg-slate-900 p-6 text-white">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-yellow-400 font-black text-xl italic uppercase leading-none">Glovo Support Guide</h1>
                    <div class="bg-yellow-400 text-slate-900 text-[10px] px-2 py-1 rounded font-black" id="stepBadge">PASSO 1</div>
                </div>
                
                <div id="cancelToggleContainer" class="hidden bg-white/10 p-3 rounded-xl flex items-center justify-between border border-white/20">
                    <span class="text-[10px] font-black uppercase italic">O cliente pediu cancelamento?</span>
                    <input type="checkbox" id="wantsCancel" onchange="toggleCancelMode()" class="w-5 h-5 accent-red-600">
                </div>
            </div>

            <div class="p-8 flex-1" id="flowContainer">
                
                <div id="step-calc" class="step active">
                    <h2 class="text-xl font-black mb-6 uppercase">1. Cálculo de Atraso</h2>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">ETA Previsto</label>
                            <input type="time" id="eta" class="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Hora Atual</label>
                            <input type="time" id="now" class="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                    </div>
                    <button onclick="initFlow()" class="w-full bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl shadow-xl hover:scale-[1.01] transition-all uppercase italic">Iniciar Atendimento →</button>
                </div>

                <div id="step-model" class="step">
                    <h2 class="text-xl font-black mb-6 uppercase italic">2. Tipo de Entrega</h2>
                    <button onclick="setMode('Vendor')" class="btn-nav">Vendor Delivery (Loja) <span>→</span></button>
                    <button onclick="setMode('Platform')" class="btn-nav">Platform Delivery (Glovo) <span>→</span></button>
                </div>

                <div id="step-store" class="step">
                    <button onclick="backTo('step-model')" class="text-[10px] font-bold text-slate-400 mb-4 uppercase underline">← Voltar</button>
                    <h2 class="text-xl font-black mb-4 uppercase italic">3. Status do Pedido</h2>
                    <p class="text-xs font-bold text-slate-500 mb-6 italic">O pedido foi marcado como "PRONTO" na App?</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setStoreStatus(true)" class="btn-nav !justify-center">SIM</button>
                        <button onclick="setStoreStatus(false)" class="btn-nav !justify-center">NÃO</button>
                    </div>
                </div>

                <div id="step-store-diag" class="step">
                    <h2 class="text-xl font-black mb-4 uppercase italic">Diagnóstico da Loja</h2>
                    <button onclick="diagLoja('nao_atende')" class="btn-nav !bg-slate-100 !text-slate-800">1. Loja não atendeu</button>
                    <button onclick="diagLoja
