<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Expert Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .btn-nav { @apply w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl hover:bg-slate-800 transition-all flex justify-between items-center mb-3 shadow-sm; }
        .btn-back { @apply flex items-center gap-2 text-slate-400 font-bold text-[10px] uppercase hover:text-slate-900 transition-colors mb-4; }
    </style>
</head>
<body class="bg-yellow-400 min-h-screen p-4 font-sans text-slate-900">

    <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-4 mt-4">
        
        <div class="flex-1 bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="bg-slate-900 p-6 text-white">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-yellow-400 font-black text-xl italic uppercase leading-none">Glovo Support</h1>
                    <span id="progress-text" class="text-[10px] font-bold opacity-60 uppercase">Passo 1 de 5</span>
                </div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-yellow-400 h-full transition-all duration-500" style="width: 20%"></div>
                </div>
            </div>

            <div id="steps-container" class="p-8 flex-1 min-h-[450px]">
                
                <div id="step1" class="step active">
                    <h2 class="text-xl font-black mb-4 uppercase">1. Início e Cálculo</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">ETA Previsto</label>
                            <input type="time" id="eta" class="w-full p-3 border-2 border-slate-100 rounded-xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Hora Atual</label>
                            <input type="time" id="now" class="w-full p-3 border-2 border-slate-100 rounded-xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                    </div>
                    <button onclick="submitStep1()" class="w-full bg-yellow-400 text-slate-900 font-black py-4 rounded-2xl shadow-lg hover:scale-[1.01] transition-transform uppercase italic">Analisar Atraso →</button>
                </div>

                <div id="step2" class="step">
                    <button onclick="prevStep(1)" class="btn-back">← Voltar para tempo</button>
                    <h2 class="text-xl font-black mb-6 uppercase">2. Tipo de Entrega</h2>
                    <button onclick="submitStep2('Vendor Delivery')" class="btn-nav">Vendor Delivery (Loja) <span>→</span></button>
                    <button onclick="submitStep2('Platform Delivery')" class="btn-nav">Platform Delivery (Glovo) <span>→</span></button>
                </div>

                <div id="step3" class="step">
                    <button onclick="prevStep(2)" class="btn-back">← Voltar para modelo</button>
                    <h2 class="text-xl font-black mb-4 uppercase">3. Status do Pedido</h2>
                    <p class="text-sm text-gray-500 mb-6 font-bold italic">O pedido foi marcado como PRONTO?</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="submitStep3('Sim')" class="btn-nav !justify-center">SIM</button>
                        <button onclick="submitStep3('Não')" class="btn-nav !justify-center">NÃO</button>
                    </div>
                </div>

                <div id="step4" class="step">
                    <button onclick="prevStep(3)" class="btn-back">← Voltar para status</button>
                    <h2 class="text-xl font-black mb-4 uppercase italic">4. Complexidade</h2>
                    <button onclick="submitStep4('Pedido Grande')" class="btn-nav">É um pedido GRANDE? <span>→</span></button>
                    <button onclick="submitStep4('Pedido Stacked')" class="btn-nav">É um pedido STACKED? <span>→</span></button>
                    <button onclick="submitStep4('Nenhum')" class="btn-nav !bg-slate-400">Nenhum destes <span>→</span></button>
                </div>

                <div id="step5" class="step">
                    <button onclick="prevStep(4)" class="btn-back">← Alterar complexidade</button>
                    <h2 class="text-xl font-black mb-6 uppercase italic text-center">Tratativa Final</h2>
                    <div id="final-instruction" class="space-y-4"></div>
                    <button onclick="location.reload()" class="mt-8 w-full border-2 border-slate-900 py-3 rounded-xl font-black uppercase text-xs">Novo Atendimento</button>
                </div>

            </div>
        </div>

        <div class="w-full md:w-72 bg-slate-900 rounded-3xl p-6 text-white shadow-2xl self-start">
            <h3 class="text-yellow-400 font-black text-xs uppercase tracking-widest mb-6 border-b border-slate-700 pb-2">Dados Recolhidos</h3>
            <div id="summary" class="space-y-4">
                <p class="text-[10px] text-slate-500 italic uppercase">Aguardando dados...</p>
            </div>
        </div>

    </div>

    <script>
        let data = {
            atraso: 0,
            modelo: "",
            pronto: "",
            complexidade: ""
        };

        const summaryEl = document.getElementById('summary');

        function updateSummary() {
            let html = "";
            if(data.atraso) html += `<div class="fade-in"><span class="block text-[9px] text-slate-500 uppercase font-bold">Atraso Calculado</span><span class="text-sm font-bold text-white">${data.atraso} Minutos</span></div>`;
            if(data.modelo) html += `<div class="fade-in"><span class="block text-[9px] text-slate-500 uppercase font-bold">Modelo</span><span class="
