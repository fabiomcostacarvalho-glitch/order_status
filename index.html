<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Expert Guide v14</title>
    <style>
        /* RESET E CORES */
        :root { --navy: #000045; --yellow: #FFC244; --red: #FF4444; --gray: #f1f5f9; --green: #22c55e; }
        body { background: var(--yellow); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        /* CARD PRINCIPAL */
        .card { background: white; width: 100%; max-width: 480px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; position: relative; z-index: 1; }
        
        .header { background: var(--navy); color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; color: var(--yellow); font-style: italic; font-size: 20px; text-transform: uppercase; }
        
        /* PROGRESS BAR FIXA */
        .progress-container { background: #eee; height: 8px; width: 100%; }
        #progress-fill { background: var(--yellow); height: 100%; width: 20%; transition: 0.3s; }

        /* CONTEÚDO */
        .content { padding: 30px; min-height: 400px; }
        .step { display: none; }
        .step.active { display: block; }
        
        /* BOTÕES */
        button { 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            font-size: 13px; 
            display: block;
            position: relative;
            z-index: 10; /* Garante que o botão está sempre no topo para clique */
        }
        .btn-navy { background: var(--navy); color: white; }
        .btn-yellow { background: var(--yellow); color: var(--navy); border: 2px solid var(--navy); }
        .btn-gray { background: var(--gray); color: #334155; border: 1px solid #ddd; }
        .btn-red { background: var(--red); color: white; }
        .btn-back { background: none; color: #888; text-decoration: underline; font-size: 11px; width: auto; padding: 5px; margin-bottom: 15px; }

        /* SELEÇÃO SIM/NÃO */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { flex: 1; padding: 12px; background: #eee; color: #666; }
        .selected-yes { background: #dcfce7 !important; border: 2px solid var(--green) !important; color: #166534 !important; }
        .selected-no { background: #fee2e2 !important; border: 2px solid var(--red) !important; color: #991b1b !important; }
        
        /* INPUTS */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input[type="time"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; box-sizing: border-box; }

        /* RESULTADOS */
        .alert { padding: 20px; border-radius: 15px; font-size: 15px; font-weight: bold; line-height: 1.5; border-left: 6px solid #3b82f6; background: #eff6ff; color: #1e40af; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h1>Glovo Support Guide</h1></div>
    <div class="progress-container"><div id="progress-fill"></div></div>

    <div class="content">
        <div id="step1" class="step active">
            <h2 style="margin-top:0;">1. Tipo de Pedido</h2>
            <p style="font-size:14px; color:#666; margin-bottom:25px;">Escolha a categoria do pedido:</p>
            <button class="btn-navy" onclick="setCategory('Food')">🍔 Food (Restaurantes)</button>
            <button class="btn-navy" onclick="setCategory('QCommerce')">🛍️ Q-Commerce (Lojas/Super)</button>
        </div>

        <div id="step2" class="step">
            <button class="btn-back" onclick="navegar(1)">← VOLTAR</button>
            <h2>2. Calcular Atraso</h2>
            <div class="input-group">
                <label>ETA Previsto (App)</label>
                <input type="time" id="t-eta">
            </div>
            <div class="input-group">
                <label>Hora Atual (Agora)</label>
                <input type="time" id="t-now">
            </div>
            <button class="btn-yellow" onclick="calcTime()">Analisar Atraso →</button>
        </div>

        <div id="step3" class="step">
            <button class="btn-back" onclick="voltarDeModelo()">← VOLTAR</button>
            <h2>3. Modelo de Entrega</h2>
            <button class="btn-navy" onclick="setModelo('Vendor')">Vendor
