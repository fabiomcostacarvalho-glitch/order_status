<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Support Guide v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-navy { background-color: #000045; color: white; font-weight: bold; width: 100%; padding: 1rem; border-radius: 1rem; margin-bottom: 0.75rem; text-transform: uppercase; transition: 0.2s; }
        .btn-navy:hover { background-color: #000025; transform: translateY(-1px); }
        .btn-yellow { background-color: #FFC244; color: #000045; font-weight: 900; width: 100%; padding: 1.25rem; border-radius: 1rem; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-[#FFC244] min-h-screen p-4 font-sans text-[#000045]">

    <div class="max-w-xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col mt-4">
        
        <div class="bg-[#000045] p-6 text-center">
            <h1 class="text-[#FFC244] font-black italic text-xl uppercase tracking-wider">Glovo Support Guide</h1>
            <div class="w-full bg-slate-700 h-1.5 rounded-full mt-4 overflow-hidden">
                <div id="progress-bar" class="bg-[#FFC244] h-full transition-all duration-500" style="width: 20%"></div>
            </div>
        </div>

        <div id="cancel-zone" class="bg-red-50 p-4 border-b border-red-100 hidden flex items-center justify-between px-8">
            <span class="text-red-700 font-bold text-[10px] uppercase italic">O cliente quer cancelar?</span>
            <input type="checkbox" id="cancel-trigger" class="w-6 h-6 accent-red-600 cursor-pointer">
        </div>

        <div id="content-area" class="p-8 min-h-[450px]">

            <div id="step1" class="step active">
                <h2 class="text-xl font-black mb-6 uppercase">1. Calcular Atraso</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ETA Previsto</label>
                        <input type="time" id="eta-val" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 font-bold outline-none focus:border-[#FFC244]">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Hora Atual</label>
                        <input type="time" id="now-val" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 font-bold outline-none focus:border-[#FFC244]">
                    </div>
                </div>
                <button id="btn-start" class="btn-yellow">Analisar Atraso →</button>
            </div>

            <div id="step2" class="step">
                <button class="back-btn text-[10px] font-bold text-slate-400 uppercase mb-4 block" data-target="1">← Voltar</button>
                <h2 class="text-xl font-black mb-6 uppercase">2. Tipo de Entrega</h2>
                <button class="btn-navy model-select" data-model="Vendor">Vendor Delivery (Loja)</button>
                <button class="btn-navy model-select" data-model="Platform">Platform Delivery (Glovo)</button>
            </div>

            <div id="step3" class="step">
                <button class="back-btn text-[10px] font-bold text-slate-400 uppercase mb-4 block" data-target="2">← Voltar</button>
                <h2 class="text-xl font-black mb-6 uppercase">3. Status na App</h2>
                <p class="text-sm font-bold text-slate
