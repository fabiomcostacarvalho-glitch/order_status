<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Support - Live Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-yellow-400 min-h-screen p-4 font-sans text-slate-900">

    <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-4 mt-4">
        
        <div class="flex-1 bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[500px] flex flex-col">
            <div class="bg-slate-900 p-6 text-white">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-yellow-400 font-black text-xl italic uppercase leading-none">Glovo Support</h1>
                    <span id="stepIndicator" class="text-[10px] font-bold opacity-60 uppercase">Passo 1 de 5</span>
                </div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-yellow-400 h-full transition-all duration-500" style="width: 20%"></div>
                </div>
            </div>

            <div class="p-8 flex-1">
                
                <div id="div-step1" class="step active">
                    <h2 class="text-xl font-black mb-6 uppercase">1. Início e Cálculo</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">ETA Previsto</label>
                            <input type="time" id="input-eta" class="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase">Hora Atual</label>
                            <input type="time" id="input-now" class="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold focus:border-yellow-400 outline-none">
                        </div>
                    </div>
                    <button onclick="processStep1()" class="w-full bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all uppercase italic">Analisar Atraso →</button>
                </div>

                <div id="div-step2" class="step">
                    <button onclick="showStep(1)" class="text-[10px] font-bold text-slate-400 mb-4 uppercase">← Voltar</button>
                    <h2 class="text-xl font-black mb-6 uppercase italic">2. Tipo de Entrega</h2>
                    <button onclick="processStep2('Vendor Delivery')" class="w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl mb-3 flex justify-between items-center">Vendor Delivery (Loja) <span>→</span></button>
                    <button onclick="processStep2('Platform Delivery')" class="w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl flex justify-between items-center">Platform Delivery (Glovo) <span>→</span></button>
                </div>

                <div id="div-step3" class="step">
                    <button onclick="showStep(2)" class="text-[10px] font-bold text-slate-400 mb-4 uppercase">← Voltar</button>
                    <h2 class="text-xl font-black mb-6 uppercase italic">3. Status do Pedido</h2>
                    <p class="text-sm font-bold text-slate-500 mb-6">O pedido está pronto na App?</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="processStep3('Sim')" class="bg-slate-900 text-white font-bold py-4 rounded-2xl">SIM</button>
                        <button onclick="processStep3('Não')" class="bg-slate-900 text-white font-bold py-4 rounded-2xl">NÃO</button>
                    </div>
                </div>

                <div id="div-step4" class="step">
                    <button onclick="showStep(3)" class="text-[10px] font-bold text-slate-400 mb-4 uppercase">← Voltar</button>
                    <h2 class="text-xl font-black mb-6 uppercase italic text-red-600">4. Complexidade e Solução</h2>
                    <div id="finalInstructions" class="space-y-4"></div>
                </div>

            </div>
        </div>

        <div class="w-full md:w-80 bg-slate-900 rounded-3xl p-6 text-white shadow-2xl self-start">
            <h3 class="text-yellow-400 font-black text-xs uppercase tracking-widest mb-6 border-b border-slate-700 pb-2">Informação Recolhida</h3>
            <div id="dataLog" class="space-y-4 text-sm">
                <p class="text-slate-500 italic text-xs">Aguardando dados...</p>
            </div>
        </div>
    </div>

    <script>
        // Objeto global para guardar os dados
        window.atendimento = {
            atraso: 0,
            modelo: "",
            pronto: ""
        };

        function showStep(n) {
            // Esconde todos
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            // Mostra o pretendido
            document.getElementById('div-step' + n).classList.add('active');
            // Atualiza progresso
            document.getElementById('progressBar').style.width = (n * 25) + "%";
            document.getElementById('stepIndicator').innerText = "Passo " + n + " de 4";
        }

        function updateLog() {
            let log = "";
            if(window.atendimento.atraso) log += `<div><b class="block text-slate-500 text-[10px] uppercase">Atraso</b><span class="text-yellow-400 font-bold">${window.atendimento.atraso} Minutos</span></div>`;
            if(window.atendimento.modelo) log += `<div><b class="block text-slate-500 text-[10px] uppercase">Modelo</b><span>${window.atendimento.modelo}</span></div>`;
            if(window.atendimento.pronto) log += `<div><b class="block text-slate-500 text-[10px] uppercase">Pronto?</b><span>${window.atendimento.pronto}</span></div>`;
            document.getElementById('dataLog').innerHTML = log || "Aguardando...";
        }

        function processStep1() {
            const eta = document.getElementById('input-eta').value;
            const agora = document.getElementById('input-now').value;
            
            if(!eta || !agora) {
                alert("Por favor, preencha os horários.");
                return;
            }

            const [h1, m1] = eta.split(':').map(Number);
            const [h2, m2] = agora.split(':').map(Number);
            window.atendimento.atraso = (h2 * 60 + m2) - (h1 * 60 + m1);
            
            updateLog();
            showStep(2);
        }

        function processStep2(val) {
            window.atendimento.modelo = val;
            updateLog();
            if(val === 'Vendor Delivery') {
                window.atendimento.pronto = "N/A (Loja)";
                processStepFinal();
            } else {
                showStep(3);
            }
        }

        function processStep3(val) {
            window.atendimento.pronto = val;
            updateLog();
            processStepFinal();
        }

        function processStepFinal() {
            const container = document.getElementById('finalInstructions');
            let html = "";

            // Lógica de Negócio
            if(window.atendimento.atraso >= 40) {
                html += `<div class="bg-red-600 text-white p-6 rounded-2xl font-black text-center uppercase shadow-lg">Elegível para Cancelamento Gratuito</div>`;
            } else if (window.atendimento.atraso >= 15) {
                html += `<div class="bg-green-100 text-green-800 p-6 rounded-2xl border-2 border-green-200 font-bold text-center italic">Oferecer Compensação (Atraso > 15min)</div>`;
            } else {
                html += `<div class="bg-slate-100 p-6 rounded-2xl font-bold text-center">Incentivar o cliente a aguardar (Atraso reduzido)</div>`;
            }

            if(window.atendimento.modelo === 'Vendor Delivery') {
                html += `<p class="text-xs bg-orange-50 p-4 rounded-xl border-l-4 border-orange-400"><b>Atenção:</b> Contactar a loja diretamente para status do estafeta.</p>`;
            }

            html += `<button onclick="location.reload()" class="w-full py-4 border-2 border-slate-900 rounded-xl font-black uppercase text-xs">Finalizar e Reiniciar</button>`;
            
            container.innerHTML = html;
            showStep(4);
        }
    </script>
</body>
</html>
