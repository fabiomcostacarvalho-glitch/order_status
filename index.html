<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo | Guia de Atendimento Interativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-choice { @apply w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl hover:bg-slate-800 transition-all flex justify-between items-center group mb-3; }
        .btn-cancel { @apply w-full bg-red-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-red-700 transition-all mb-4 flex justify-center items-center gap-2; }
    </style>
</head>
<body class="bg-yellow-400 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="app" class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="bg-slate-900 p-6 text-white text-center relative">
            <h1 class="text-yellow-400 font-bold text-xl uppercase tracking-wider">Glovo | Guia de Atendimento</h1>
            <p class="text-sm opacity-80 italic">Foco: Redução de TMA + Aumento de CSAT</p>
        </div>

        <div id="cancel-zone" class="bg-red-50 p-4 border-b border-red-100 hidden">
            <label class="flex items-center justify-center gap-3 cursor-pointer">
                <input type="checkbox" id="cancelTrigger" class="w-5 h-5 accent-red-600" onchange="toggleCancelFlow()">
                <span class="text-red-700 font-bold text-sm uppercase">O cliente pediu o cancelamento?</span>
            </label>
        </div>

        <div id="step-content" class="p-8 min-h-[400px]">
            </div>

        <div class="p-4 bg-gray-50 border-t flex justify-between items-center text-xs text-gray-400">
            <span>Atendemos pessoas. Conectamos experiências.</span>
            <button onclick="startApp()" class="text-slate-900 font-bold underline">Reiniciar</button>
        </div>
    </div>

    <script>
        let state = {
            atrasoMinutos: 0,
            isPlatform: false,
            currentStep: 'start'
        };

        function render(html) {
            document.getElementById('step-content').innerHTML = `<div class="fade-in">${html}</div>`;
        }

        // --- INÍCIO ---
        function startApp() {
            state.atrasoMinutos = 0;
            state.currentStep = 'start';
            document.getElementById('cancel-zone').classList.add('hidden');
            document.getElementById('cancelTrigger').checked = false;
            
            render(`
                <h2 class="text-2xl font-black text-slate-900 mb-4">1. Abertura do Atendimento</h2>
                <p class="text-gray-600 mb-6 leading-relaxed">Cumprimente de forma objetiva e humanizada. Solicite um momento para análise.</p>
                <div class="border-l-4 border-yellow-400 pl-4 italic text-gray-500 mb-8">"Vou verificar seu pedido agora e já te retorno com uma atualização, tudo bem?"</div>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">ETA Previsto</label>
                        <input type="time" id="eta" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Hora Actual</label>
                        <input type="time" id="now" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                </div>

                <button onclick="handleAtraso()" class="btn-choice">
                    Analisar Atraso <span>→</span>
                </button>
            `);
        }

        function handleAtraso() {
            const t1 = document.getElementById('eta').value;
            const t2 = document.getElementById('now').value;
            if(!t1 || !t2) return alert("Por favor, preencha as horas.");

            const [h1, m1] = t1.split(':').map(Number);
            const [h2, m2] = t2.split(':').map(Number);
            state.atrasoMinutos = (h2 * 60 + m2) - (h1 * 60 + m1);

            document.getElementById('cancel-zone').classList.remove('hidden');
            stepIdentificacao();
        }

        // --- IDENTIFICAÇÃO ---
        function stepIdentificacao() {
            state.currentStep = 'identificacao';
            const compMsg = state.atrasoMinutos >= 15 
                ? `<div class="bg-green-100 text-green-700 p-3 rounded-lg text-xs font-bold mb-4 italic">✓ Atraso de ${state.atrasoMinutos}min: Compensação disponível.</div>`
                : `<div class="bg-slate-100 text-slate-500 p-3 rounded-lg text-xs font-bold mb-4 italic">Atraso de ${state.atrasoMinutos}min: Sem compensação.</div>`;

            render(`
                <h2 class="text-2xl font-black text-slate-900 mb-2">2. Identificação</h2>
                ${compMsg}
                <p class="text-gray-600 mb-6">Qual o modelo de entrega deste pedido?</p>
                
                <button onclick="stepVendor()" class="btn-choice">Vendor Delivery (Loja) <span>→</span></button>
                <button onclick="state.isPlatform=true; stepPlatform()" class="btn-choice">Platform Delivery (Glovo) <span>→</span></button>
            `);
        }

        // --- VENDOR ---
        function stepVendor() {
            state.currentStep = 'vendor';
            render(`
                <h2 class="text-2xl font-black text-slate-900 mb-4">3. Diagnóstico: LOJA</h2>
                <div class="bg-orange-50 p-6 rounded-2xl border-2 border-orange-200 mb-6">
                    <p class="text-orange-800 font-bold mb-2 uppercase text-sm">Ação Obrigatória:</p>
                    <p class="text-orange-900">O suporte não tem visibilidade do estafeta. <b>Ligue para a loja imediatamente</b> para obter atualização.</p>
                </div>
                <button onclick="stepComplexidade()" class="btn-choice">Avançar para Complexidade <span>→</span></button>
            `);
        }

        // --- PLATFORM ---
        function stepPlatform() {
            state.currentStep = 'platform';
            render(`
                <h2 class="text-2xl font-black text-slate-900 mb-4">3. Status do Pedido</h2>
                <p class="text-gray-600 mb-6 font-medium italic">O pedido foi marcado como "PRONTO" na App?</p>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="stepEstafetaAssign()" class="btn-choice !justify-center">Sim</button>
                    <button onclick="stepLigarLoja()" class="btn-choice !justify-center">Não</button>
                </div>
            `);
        }
