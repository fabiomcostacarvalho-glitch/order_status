<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Support Guide v15</title>
    <style>
        :root { --navy: #000045; --yellow: #FFC244; --red: #FF4444; --gray: #f8fafc; }
        body { background: var(--yellow); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 25px; box-sizing: border-box; }
        .header { background: var(--navy); color: white; padding: 15px; text-align: center; border-radius: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--yellow); font-style: italic; font-size: 18px; text-transform: uppercase; }
        
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        h2 { font-size: 14px; text-transform: uppercase; margin-bottom: 10px; color: var(--navy); }
        
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; }
        select, input[type="time"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-opt { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #ddd; background: #fff; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-opt.active { background: var(--navy); color: white; border-color: var(--navy); }

        #veredito { margin-top: 25px; padding: 20px; border-radius: 15px; background: #eff6ff; border-left: 6px solid #3b82f6; display: none; }
        #veredito h3 { margin: 0 0 10px 0; font-size: 16px; color: #1e40af; text-transform: uppercase; }
        #msg-final { font-size: 14px; font-weight: bold; line-height: 1.5; color: #1e3a8a; }
        
        .btn-reset { width: 100%; padding: 15px; background: var(--navy); color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h1>Glovo Support Guide</h1></div>

    <div class="section">
        <h2>1. Tipo de Pedido e Atraso</h2>
        <select id="cat" onchange="atualizar()">
            <option value="Food">🍔 Food (Restaurantes)</option>
            <option value="QCommerce">🛍️ Q-Commerce</option>
        </select>
        <div id="time-group" style="display: flex; gap: 10px;">
            <div style="flex:1;"><label>ETA</label><input type="time" id="t-eta" onchange="atualizar()"></div>
            <div style="flex:1;"><label>AGORA</label><input type="time" id="t-now" onchange="atualizar()"></div>
        </div>
    </div>

    <div class="section">
        <h2>2. Modelo e Contacto Loja</h2>
        <div class="btn-group">
            <button class="btn-opt" id="m-vendor" onclick="setM('Vendor')">Vendor</button>
            <button class="btn-opt" id="m-platform" onclick="setM('Platform')">Platform</button>
        </div>
        <p style="font-size:10px; font-weight:bold; color:#888; margin: 10px 0 5px 0;">STATUS DA CHAMADA NA LOJA:</p>
        <div class="btn-group">
            <button class="btn-opt" id="l-nao" onclick="setL('nao_atende')">Não Atende</button>
            <button class="btn-opt" id="l-pronto" onclick="setL('pronto')">Pronto</button>
            <button class="btn-opt" id="l-recusa" onclick="setL('recusa')">Recusa</button>
        </div>
    </div>

    <div id="rider-section" class="section" style="display:none;">
        <h2>3. Dados do Rider (Platform)</h2>
        <label>1. Tem estafeta atribuído?</label>
        <div class="btn-group mb-2">
            <button class="btn-opt" id="q1y" onclick="setQ(1,true)">SIM</button>
            <button class="btn-opt" id="q1n" onclick="setQ(1,false)">NÃO</button>
        </div>
        <label style="margin-top:10px;">2. Foi recolhido (Pick-up)?</label>
        <div class="btn-group">
            <button class="btn-opt" id="q2y" onclick="setQ(2,true)">SIM</button>
            <button class="btn-opt" id="q2n" onclick="setQ(2,false)">NÃO</button>
        </div>
        <label style="margin-top:10px;">3. Aceite há 20m+ / Rider Parado?</label>
        <div class="btn-group">
            <button class="btn-opt" id="q3y" onclick="setQ(3,true)">SIM</button>
            <button class="btn-opt" id="q3n" onclick="setQ(3,false)">NÃO</button>
        </div>
    </div>

    <div id="veredito">
        <h3>Resultado Recomendado:</h3>
        <div id="msg-final"></div>
        <button class="btn-reset" onclick="location.reload()">Limpar / Novo Caso</button>
    </div>
</div>

<script>
    var s = { cat: 'Food', m: '', l: '', q1: null, q2: null, q3: null };

    function setM(val) { 
        s.m = val; 
        document.getElementById('m-vendor').className = val == 'Vendor' ? 'btn-opt active' : 'btn-opt';
        document.getElementById('m-platform').className = val == 'Platform' ? 'btn-opt active' : 'btn-opt';
        document.getElementById('rider-section').style.display = val == 'Platform' ? 'block' : 'none';
        atualizar(); 
    }
    function setL(val) { 
        s.l = val; 
        document.getElementById('l-nao').className = val == 'nao_atende' ? 'btn-opt active' : 'btn-opt';
        document.getElementById('l-pronto').className = val == 'pronto' ? 'btn-opt active' : 'btn-opt';
        document.getElementById('l-recusa').className = val == 'recusa' ? 'btn-opt active' : 'btn-opt';
        atualizar(); 
    }
    function setQ(n, val) { 
        s['q'+n] = val; 
        document.getElementById('q'+n+'y').className = val ? 'btn-opt active' : 'btn-opt';
        document.getElementById('q'+n+'n').className = !val ? 'btn-opt active' : 'btn-opt';
        atualizar(); 
    }

    function atualizar() {
        s.cat = document.getElementById('cat').value;
        document.getElementById('time-group').style.display = s.cat == 'Food' ? 'flex' : 'none';
        
        var msg = "";
        var t1 = document.getElementById('t-eta').value;
        var t2 = document.getElementById('t-now').value;
        var atraso = 0;
        if(t1 && t2) atraso = (parseInt(t2.split(':')[0])*60+parseInt(t2.split(':')[1])) - (parseInt(t1.split(':')[0])*60+parseInt(t1.split(':')[1]));

        if(!s.m || !s.l) return;

        // 1. LOJA RECUSA
        if(s.l == 'recusa') msg = "LOJA SATURADA: Realizar cancelamento imediato e compensar o cliente.";
        
        // 2. VENDOR
        else if(s.m == 'Vendor') {
            if(s.l == 'nao_atende') msg = "PARCEIRO NÃO ATENDE: Negar cancelamento. Cliente deve aguardar ou cancelar COM CUSTOS.";
            else msg = "VENDOR PRONTO: Parceiro confirmou entrega em curso. Aguardar ou cancelar COM CUSTOS.";
        }
        
        // 3. PLATFORM
        else if(s.m == 'Platform') {
            if(s.q1 === null || s.q2 === null) msg = "A aguardar dados do Rider (Pergunta 1 e 2)...";
            else if(s.cat == 'QCommerce') {
                msg = !s.q1 ? "Q-COMMERCE: Sem estafeta. CANCELAMENTO GRATUITO permitido." : "Q-COMMERCE: Com estafeta. Cancelamento COM CUSTOS.";
            } else {
                if(atraso >= 40 && !s.q2) msg = "FOOD: Atraso > 40min e não recolhido. CANCELAMENTO GRATUITO permitido.";
                else if(s.q1 && s.q3 && !s.q2) msg = "REATRIBUIÇÃO: Rider parado/atrasado. Proceder com a troca de estafeta.";
                else msg = "MANTER: Informar cliente que o pedido está em curso. Se insistir, cancelamento COM CUSTOS.";
            }
        }

        if(msg) {
            document.getElementById('veredito').style.display = 'block';
            document.getElementById('msg-final').innerText = msg;
        }
    }
</script>

</body>
</html>
